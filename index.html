<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Macro Ledger</title>
<style>
  :root{
    --bg:#15171a; --surface:#1e2124; --surface2:#26292d;
    --ink:#edeae3; --muted:#8b8f96; --line:#33373c;
    --protein:#4fb6a8; --carbs:#e8a33d; --fat:#d9707a;
    --good:#4fb6a8; --danger:#d9707a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    padding-bottom:80px;
  }
  .num{font-variant-numeric:tabular-nums; font-weight:800; letter-spacing:-0.02em;}
  header{
    padding:20px 16px 12px; position:sticky; top:0; background:var(--bg);
    z-index:10; border-bottom:1px solid var(--line);
  }
  header h1{margin:0; font-size:20px; letter-spacing:-0.01em;}
  header .sub{color:var(--muted); font-size:13px; margin-top:2px;}

  .summary{margin:16px; background:var(--surface); border-radius:16px; padding:16px;}
  .cal-row{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px;}
  .cal-row .num{font-size:32px;}
  .cal-row .goal{color:var(--muted); font-size:14px;}
  .macro-bar{margin-bottom:12px;}
  .macro-bar:last-child{margin-bottom:0;}
  .macro-bar .label-row{display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px;}
  .macro-bar .label-row .name{color:var(--muted); text-transform:uppercase; font-size:11px; letter-spacing:.06em; font-weight:700;}
  .track{height:8px; border-radius:5px; background:var(--surface2); overflow:hidden;}
  .fill{height:100%; border-radius:5px; transition:width .25s ease;}
  .fill.protein{background:var(--protein);} .fill.carbs{background:var(--carbs);} .fill.fat{background:var(--fat);}

  .tabs{display:flex; margin:0 16px 12px; background:var(--surface); border-radius:12px; padding:4px;}
  .tab{flex:1; text-align:center; padding:9px; border-radius:9px; font-size:14px; font-weight:600; color:var(--muted); cursor:pointer;}
  .tab.active{background:var(--surface2); color:var(--ink);}

  .section{margin:0 16px;}
  .section-title{font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); font-weight:700; margin:18px 0 8px;}
  .cat-heading{margin-top:20px; padding-bottom:4px; border-bottom:1px solid var(--line);}
  .cat-heading:first-child{margin-top:0;}
  .hack-badge{
    display:inline-block; font-size:9px; font-weight:800; letter-spacing:.03em; color:var(--bg);
    background:var(--carbs); border-radius:5px; padding:1px 5px; margin-left:6px; vertical-align:middle;
  }
  .mp{color:var(--protein); font-weight:700;}
  .mc{color:var(--carbs); font-weight:700;}
  .mf{color:var(--fat); font-weight:700;}

  .quickadd-btn{
    width:100%; padding:13px; border-radius:12px; border:1px dashed var(--line);
    background:transparent; color:var(--muted); font-size:14px; font-weight:600; margin-bottom:14px;
  }

  .grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .food-card{
    background:var(--surface); border-radius:14px; padding:12px; position:relative;
    border:1px solid transparent;
  }
  .food-card.has-qty{border-color:var(--protein);}
  .food-card .name{font-size:14px; font-weight:700; margin-bottom:2px; padding-right:20px;}
  .food-card .macros{font-size:11px; color:var(--muted); margin-bottom:10px;}
  .food-card .stepper{display:flex; align-items:center; justify-content:space-between;}
  .stepper button{
    width:30px; height:30px; border-radius:8px; border:none; background:var(--surface2);
    color:var(--ink); font-size:16px; font-weight:700; line-height:1;
  }
  .stepper button:active{background:var(--protein); color:#0b0c0d;}
  .stepper .qty{font-size:15px; min-width:20px; text-align:center;}
  .del-food{position:absolute; top:8px; right:8px; color:var(--muted); background:none; border:none; font-size:14px; padding:2px 6px;}

  .log-list{display:flex; flex-direction:column; gap:8px;}
  .log-item{
    display:flex; justify-content:space-between; align-items:center;
    background:var(--surface); border-radius:12px; padding:10px 12px; font-size:13px;
  }
  .log-item .li-name{font-weight:600;}
  .log-item .li-macros{color:var(--muted); font-size:11px; margin-top:1px;}
  .log-item button{background:none; border:none; color:var(--danger); font-size:13px; font-weight:600;}
  .empty{color:var(--muted); font-size:13px; text-align:center; padding:20px 0;}

  .fab{
    position:fixed; bottom:20px; right:16px; width:56px; height:56px; border-radius:50%;
    background:var(--protein); color:#0b0c0d; border:none; font-size:26px; font-weight:700;
    box-shadow:0 6px 18px rgba(0,0,0,.4); z-index:20;
  }

  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.55); display:none;
    align-items:flex-end; z-index:30;
  }
  .overlay.open{display:flex;}
  .sheet{
    background:var(--surface); width:100%; border-radius:20px 20px 0 0; padding:20px 16px 28px;
    max-height:85vh; overflow-y:auto;
  }
  .sheet h2{margin:0 0 14px; font-size:17px;}
  .field{margin-bottom:12px;}
  .field label{display:block; font-size:12px; color:var(--muted); margin-bottom:5px; font-weight:600;}
  .field input, .field select{
    width:100%; padding:11px 12px; border-radius:10px; border:1px solid var(--line);
    background:var(--surface2); color:var(--ink); font-size:15px;
  }
  .row2{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;}
  .sheet-actions{display:flex; gap:10px; margin-top:16px;}
  .btn{flex:1; padding:13px; border-radius:12px; border:none; font-size:14px; font-weight:700;}
  .btn.primary{background:var(--protein); color:#0b0c0d;}
  .btn.ghost{background:var(--surface2); color:var(--ink);}
  .checkbox-row{display:flex; align-items:center; gap:8px; font-size:13px; color:var(--muted); margin-bottom:12px;}
  .backup-row{display:flex; gap:10px; margin:18px 16px 8px;}
  .backup-row .btn{font-size:13px; padding:10px;}
  input[type=file]{display:none;}
</style>
</head>
<body>

<header>
  <h1>Macro Ledger</h1>
  <div class="sub" id="dateLabel"></div>
</header>

<div class="summary">
  <div class="cal-row">
    <div><span class="num" id="calTotal">0</span><span class="goal"> / <span id="calGoal">0</span> kcal</span></div>
  </div>
  <div class="macro-bar">
    <div class="label-row"><span class="name">Protein</span><span class="num mp" id="pText">0 / 0g</span></div>
    <div class="track"><div class="fill protein" id="pFill" style="width:0%"></div></div>
  </div>
  <div class="macro-bar">
    <div class="label-row"><span class="name">Carbs</span><span class="num mc" id="cText">0 / 0g</span></div>
    <div class="track"><div class="fill carbs" id="cFill" style="width:0%"></div></div>
  </div>
  <div class="macro-bar">
    <div class="label-row"><span class="name">Fat</span><span class="num mf" id="fText">0 / 0g</span></div>
    <div class="track"><div class="fill fat" id="fFill" style="width:0%"></div></div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="today">Today</div>
  <div class="tab" data-tab="library">My Foods</div>
</div>

<div id="tabToday" class="section">
  <button class="quickadd-btn" id="openQuick">+ Log something not on your list</button>
  <div class="section-title">Tap a food to log it</div>
  <div id="foodGrid"></div>

  <div class="section-title">Logged today</div>
  <div class="log-list" id="logList"></div>
</div>

<div id="tabLibrary" class="section" style="display:none;">
  <button class="quickadd-btn" id="openAddFood">+ Add a food to your list</button>
  <div class="log-list" id="libraryList"></div>
</div>

<div class="backup-row">
  <button class="btn ghost" id="exportBtn">Export backup (.json)</button>
  <button class="btn ghost" id="importBtn">Import backup</button>
  <input type="file" id="importFile" accept="application/json">
</div>
<div class="backup-row">
  <button class="btn ghost" id="setGoalsBtn">Set daily goals</button>
</div>

<button class="fab" id="fabAdd">+</button>

<!-- Quick log (ad hoc) sheet -->
<div class="overlay" id="quickOverlay">
  <div class="sheet">
    <h2>Log something quick</h2>
    <div class="field"><label>Name (optional)</label><input id="q_name" placeholder="e.g. slice of cake"></div>
    <div class="row2">
      <div class="field"><label>Protein g</label><input id="q_p" type="number" inputmode="decimal" value="0"></div>
      <div class="field"><label>Carbs g</label><input id="q_c" type="number" inputmode="decimal" value="0"></div>
      <div class="field"><label>Fat g</label><input id="q_f" type="number" inputmode="decimal" value="0"></div>
    </div>
    <label class="checkbox-row"><input type="checkbox" id="q_save"> Also save to My Foods for reuse</label>
    <div class="field" id="q_cat_wrap" style="display:none;"><label>Category</label>
      <select id="q_cat">
        <option value="PROTEIN">Protein</option>
        <option value="PROTEIN_FAT">Protein + Fat</option>
        <option value="CARB">Carbs</option>
        <option value="FAT">Fat</option>
        <option value="FAT_CARB">Fat + Carb</option>
        <option value="VOLUME">Volume / Low-Cal</option>
        <option value="OTHER">Other</option>
      </select>
    </div>
    <div class="sheet-actions">
      <button class="btn ghost" id="q_cancel">Cancel</button>
      <button class="btn primary" id="q_confirm">Log it</button>
    </div>
  </div>
</div>

<!-- Add food to library sheet -->
<div class="overlay" id="foodOverlay">
  <div class="sheet">
    <h2>Add a food</h2>
    <div class="field"><label>Name</label><input id="f_name" placeholder="e.g. chicken breast"></div>
    <div class="field"><label>Serving</label><input id="f_serving" placeholder="e.g. 100g" value="100g"></div>
    <div class="row2">
      <div class="field"><label>Protein g</label><input id="f_p" type="number" inputmode="decimal" value="0"></div>
      <div class="field"><label>Carbs g</label><input id="f_c" type="number" inputmode="decimal" value="0"></div>
      <div class="field"><label>Fat g</label><input id="f_f" type="number" inputmode="decimal" value="0"></div>
    </div>
    <div class="field"><label>Category</label>
      <select id="f_cat">
        <option value="PROTEIN">Protein</option>
        <option value="PROTEIN_FAT">Protein + Fat</option>
        <option value="CARB">Carbs</option>
        <option value="FAT">Fat</option>
        <option value="FAT_CARB">Fat + Carb</option>
        <option value="VOLUME">Volume / Low-Cal</option>
        <option value="OTHER">Other</option>
      </select>
    </div>
    <div class="sheet-actions">
      <button class="btn ghost" id="f_cancel">Cancel</button>
      <button class="btn primary" id="f_confirm">Save food</button>
    </div>
  </div>
</div>

<!-- Goals sheet -->
<div class="overlay" id="goalsOverlay">
  <div class="sheet">
    <h2>Daily macro goals</h2>
    <div class="field"><label>Calories</label><input id="g_kcal" type="number" inputmode="decimal"></div>
    <div class="row2">
      <div class="field"><label>Protein g</label><input id="g_p" type="number" inputmode="decimal"></div>
      <div class="field"><label>Carbs g</label><input id="g_c" type="number" inputmode="decimal"></div>
      <div class="field"><label>Fat g</label><input id="g_f" type="number" inputmode="decimal"></div>
    </div>
    <div class="sheet-actions">
      <button class="btn ghost" id="g_cancel">Cancel</button>
      <button class="btn primary" id="g_confirm">Save goals</button>
    </div>
  </div>
</div>

<script>
const KEY_FOODS='ml_foods', KEY_GOALS='ml_goals', KEY_LOG='ml_log', KEY_DATE='ml_date';
const todayStr = () => new Date().toISOString().slice(0,10);
const kcal = (p,c,f) => Math.round(p*4 + c*4 + f*9);
const macroLine = (p,c,f) => `<span class="mp">${p}p</span> · <span class="mc">${c}c</span> · <span class="mf">${f}f</span>`;

function load(key, fallback){
  try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch(e){ return fallback; }
}
function save(key, val){ localStorage.setItem(key, JSON.stringify(val)); }

const CATEGORY_ORDER = ['PROTEIN','PROTEIN_FAT','CARB','FAT','FAT_CARB','VOLUME','OTHER'];
const CATEGORY_LABELS = {
  PROTEIN:'Protein', PROTEIN_FAT:'Protein + Fat', CARB:'Carbs', FAT:'Fat',
  FAT_CARB:'Fat + Carb', VOLUME:'Volume / Low-Cal', OTHER:'Other'
};

let foods = load(KEY_FOODS, [
  {id:'f1', name:'Chicken breast, skinless, roasted', serving:'100g', p:31, f:3.6, c:0, category:'PROTEIN', hacks:[]},
  {id:'f2', name:'Turkey breast, skinless, roasted', serving:'100g', p:30, f:1.5, c:0, category:'PROTEIN', hacks:[]},
  {id:'f3', name:'Cod, cooked', serving:'100g', p:23, f:0.9, c:0, category:'PROTEIN', hacks:['HACK1']},
  {id:'f4', name:'Tilapia, cooked', serving:'100g', p:26, f:2.7, c:0, category:'PROTEIN', hacks:['HACK1']},
  {id:'f5', name:'Shrimp, cooked', serving:'100g', p:24, f:0.3, c:0.2, category:'PROTEIN', hacks:['HACK1']},
  {id:'f6', name:'Yellowfin tuna, cooked', serving:'100g', p:29, f:1, c:0, category:'PROTEIN', hacks:['HACK1']},
  {id:'f7', name:'Egg whites, liquid', serving:'100g', p:11, f:0, c:0.7, category:'PROTEIN', hacks:['HACK1']},
  {id:'f8', name:'Greek yogurt, plain, nonfat', serving:'100g', p:10, f:0.4, c:3.6, category:'PROTEIN', hacks:['HACK1']},
  {id:'f9', name:'Cottage cheese, nonfat', serving:'100g', p:12, f:0.3, c:4, category:'PROTEIN', hacks:['HACK2']},
  {id:'f11', name:'Deli turkey breast, low sodium', serving:'100g', p:17, f:1, c:3, category:'PROTEIN', hacks:['HACK2']},
  {id:'f12', name:'Egg, whole, large, boiled', serving:'1 egg (50g)', p:6.5, f:5.5, c:0.6, category:'PROTEIN_FAT', hacks:[]},
  {id:'f13', name:'Salmon, Atlantic, farmed, cooked', serving:'100g', p:22, f:12, c:0, category:'PROTEIN_FAT', hacks:[]},
  {id:'f14', name:'Ground beef, 85% lean, cooked', serving:'100g', p:26, f:17, c:0, category:'PROTEIN_FAT', hacks:[]},
  {id:'f15', name:'Pork tenderloin, cooked', serving:'100g', p:26, f:3.5, c:0, category:'PROTEIN_FAT', hacks:['HACK2']},
  {id:'f16', name:'Cheddar cheese', serving:'100g', p:25, f:33, c:1.3, category:'PROTEIN_FAT', hacks:[]},
  {id:'f17', name:'White rice, long-grain, cooked', serving:'100g', p:2.7, f:0.3, c:28.2, category:'CARB', hacks:[]},
  {id:'f18', name:'Sweet potato, baked', serving:'100g', p:2, f:0.1, c:21, category:'CARB', hacks:[]},
  {id:'f19', name:'White potato, baked', serving:'100g', p:2.5, f:0.1, c:21, category:'CARB', hacks:[]},
  {id:'f20', name:'Banana', serving:'100g', p:1.1, f:0.3, c:23, category:'CARB', hacks:['HACK2']},
  {id:'f21', name:'Honey', serving:'100g', p:0.3, f:0, c:82, category:'CARB', hacks:['HACK1']},
  {id:'f22', name:'White bread', serving:'100g', p:9, f:3.3, c:49, category:'CARB', hacks:[]},
  {id:'f23', name:'Oats, dry, rolled', serving:'100g', p:17, f:7, c:66, category:'CARB', hacks:[]},
  {id:'f24', name:'Olive oil', serving:'100g', p:0, f:100, c:0, category:'FAT', hacks:['HACK1']},
  {id:'f25', name:'Butter', serving:'100g', p:0.1, f:81, c:0.1, category:'FAT', hacks:['HACK2']},
  {id:'f26', name:'Avocado', serving:'100g', p:2, f:15, c:9, category:'FAT', hacks:[]},
  {id:'f27', name:'Almonds', serving:'100g', p:21, f:50, c:22, category:'FAT', hacks:[]},
  {id:'f28', name:'Macadamia nuts', serving:'100g', p:8, f:76, c:14, category:'FAT', hacks:[]},
  {id:'f29', name:'Peanut butter', serving:'100g', p:25, f:50, c:20, category:'PROTEIN_FAT', hacks:[]},
  {id:'f30', name:'Shirataki noodles', serving:'100g', p:0, f:0, c:3, category:'VOLUME', hacks:['HACK1']},
  {id:'f31', name:'Broccoli, raw', serving:'100g', p:2.8, f:0.4, c:7, category:'VOLUME', hacks:[]},
  {id:'f32', name:'Cucumber, raw', serving:'100g', p:0.7, f:0.1, c:3.6, category:'VOLUME', hacks:[]},
  {id:'f33', name:'Celery, raw', serving:'100g', p:0.7, f:0.2, c:3, category:'VOLUME', hacks:[]},
  {id:'f34', name:'Spinach, raw', serving:'100g', p:2.9, f:0.4, c:3.6, category:'VOLUME', hacks:[]},
  {id:'f35', name:"Optimum Nutrition Gold Standard 100% Whey (Double Rich Chocolate)", serving:'1 scoop (30g)', p:24, f:1, c:3, category:'PROTEIN', hacks:['HACK1']},
  {id:'f36', name:'Optimum Nutrition Gold Standard 100% Casein', serving:'1 scoop (33g)', p:24, f:1, c:3, category:'PROTEIN', hacks:['HACK1']},
  {id:'f37', name:'NOW Sports Dextrose Powder', serving:'2 tbsp (20g)', p:0, f:0, c:17, category:'CARB', hacks:['HACK1']},
  {id:'f38', name:"Nature Valley Oats 'n Honey Crunchy Granola Bars", serving:'2 bars (42g)', p:3, f:7, c:29, category:'FAT_CARB', hacks:[]},
  {id:'f40', name:'Apple, raw, with skin', serving:'100g', p:0.3, f:0.2, c:14, category:'CARB', hacks:[]},
  {id:'f41', name:'Orange, raw', serving:'100g', p:0.9, f:0.1, c:12, category:'CARB', hacks:[]},
  {id:'f42', name:'Grapefruit, raw', serving:'100g', p:0.8, f:0.1, c:11, category:'CARB', hacks:[]},
  {id:'f43', name:'Pineapple, raw', serving:'100g', p:0.5, f:0.1, c:13, category:'CARB', hacks:[]},
  {id:'f44', name:'Grapes, raw', serving:'100g', p:0.6, f:0.2, c:18, category:'CARB', hacks:[]},
  {id:'f45', name:'Strawberries, raw', serving:'100g', p:0.7, f:0.3, c:8, category:'CARB', hacks:[]},
  {id:'f46', name:'Blueberries, raw', serving:'100g', p:0.7, f:0.3, c:14, category:'CARB', hacks:[]},
  {id:'f47', name:'Watermelon, raw', serving:'100g', p:0.6, f:0.2, c:8, category:'CARB', hacks:[]},
  {id:'f48', name:'Mango, raw', serving:'100g', p:0.8, f:0.4, c:15, category:'CARB', hacks:[]},
  {id:'f49', name:'Pear, raw', serving:'100g', p:0.4, f:0.1, c:15, category:'CARB', hacks:[]},
  {id:'f50', name:'Peach, raw', serving:'100g', p:0.9, f:0.3, c:10, category:'CARB', hacks:[]},
  {id:'f51', name:'Cantaloupe, raw', serving:'100g', p:0.8, f:0.2, c:8, category:'CARB', hacks:[]},
]);
let goals = load(KEY_GOALS, {kcal:2000, p:150, c:200, f:65});

// reset log on a new day
let storedDate = localStorage.getItem(KEY_DATE);
let log = load(KEY_LOG, []);
if(storedDate !== todayStr()){
  log = [];
  save(KEY_LOG, log);
  localStorage.setItem(KEY_DATE, todayStr());
}
if(!storedDate) localStorage.setItem(KEY_DATE, todayStr());

document.getElementById('dateLabel').textContent = new Date().toLocaleDateString(undefined,{weekday:'long', month:'short', day:'numeric'});

function persistLog(){ save(KEY_LOG, log); }
function persistFoods(){ save(KEY_FOODS, foods); }
function persistGoals(){ save(KEY_GOALS, goals); }

function totals(){
  return log.reduce((t,e)=>({p:t.p+e.p*e.qty, c:t.c+e.c*e.qty, f:t.f+e.f*e.qty}), {p:0,c:0,f:0});
}

function render(){
  const t = totals();
  const totalCal = kcal(t.p, t.c, t.f);
  const goalCal = goals.kcal;
  document.getElementById('calTotal').textContent = totalCal;
  document.getElementById('calGoal').textContent = goalCal;
  document.getElementById('pText').textContent = `${Math.round(t.p)} / ${goals.p}g`;
  document.getElementById('cText').textContent = `${Math.round(t.c)} / ${goals.c}g`;
  document.getElementById('fText').textContent = `${Math.round(t.f)} / ${goals.f}g`;
  document.getElementById('pFill').style.width = Math.min(100, t.p/goals.p*100||0)+'%';
  document.getElementById('cFill').style.width = Math.min(100, t.c/goals.c*100||0)+'%';
  document.getElementById('fFill').style.width = Math.min(100, t.f/goals.f*100||0)+'%';

  // food grid, grouped by category
  const grid = document.getElementById('foodGrid');
  grid.innerHTML = '';
  CATEGORY_ORDER.forEach(cat=>{
    const items = foods.filter(f=>f.category===cat);
    if(items.length===0) return;
    const heading = document.createElement('div');
    heading.className = 'section-title cat-heading';
    heading.textContent = CATEGORY_LABELS[cat];
    grid.appendChild(heading);
    const catGrid = document.createElement('div');
    catGrid.className = 'grid';
    items.forEach(food=>{
      const entry = log.find(e=>e.foodId===food.id);
      const qty = entry ? entry.qty : 0;
      const card = document.createElement('div');
      card.className = 'food-card' + (qty>0 ? ' has-qty' : '');
      const hackBadges = (food.hacks||[]).map(h=>`<span class="hack-badge">${h}</span>`).join('');
      card.innerHTML = `
        <div class="name">${food.name}${hackBadges}</div>
        <div class="macros">${food.serving||'100g'} · ${macroLine(food.p, food.c, food.f)} · ${kcal(food.p,food.c,food.f)}kcal</div>
        <div class="stepper">
          <button data-act="minus" data-id="${food.id}">−</button>
          <span class="qty num">${qty}</span>
          <button data-act="plus" data-id="${food.id}">+</button>
        </div>`;
      catGrid.appendChild(card);
    });
    grid.appendChild(catGrid);
  });

  // log list
  const ll = document.getElementById('logList');
  if(log.length===0){
    ll.innerHTML = '<div class="empty">Nothing logged yet today.</div>';
  } else {
    ll.innerHTML = '';
    log.forEach(e=>{
      const row = document.createElement('div');
      row.className = 'log-item';
      row.innerHTML = `
        <div>
          <div class="li-name">${e.name}${e.qty>1?` ×${e.qty}`:''}</div>
          <div class="li-macros">${macroLine(Math.round(e.p*e.qty), Math.round(e.c*e.qty), Math.round(e.f*e.qty))}</div>
        </div>
        <button data-remove="${e.id}">Remove</button>`;
      ll.appendChild(row);
    });
  }

  // library list, grouped by category
  const lib = document.getElementById('libraryList');
  lib.innerHTML = '';
  CATEGORY_ORDER.forEach(cat=>{
    const items = foods.filter(f=>f.category===cat);
    if(items.length===0) return;
    const heading = document.createElement('div');
    heading.className = 'section-title cat-heading';
    heading.textContent = CATEGORY_LABELS[cat];
    lib.appendChild(heading);
    items.forEach(food=>{
      const hackBadges = (food.hacks||[]).map(h=>`<span class="hack-badge">${h}</span>`).join('');
      const row = document.createElement('div');
      row.className = 'log-item';
      row.innerHTML = `
        <div>
          <div class="li-name">${food.name}${hackBadges}</div>
          <div class="li-macros">${food.serving||'100g'} · ${macroLine(food.p, food.c, food.f)} · ${kcal(food.p,food.c,food.f)}kcal</div>
        </div>
        <button data-delfood="${food.id}">Delete</button>`;
      lib.appendChild(row);
    });
  });
}

// stepper / grid taps
document.getElementById('foodGrid').addEventListener('click', e=>{
  const btn = e.target.closest('button[data-act]');
  if(!btn) return;
  const id = btn.dataset.id;
  const food = foods.find(f=>f.id===id);
  let entry = log.find(e=>e.foodId===id);
  if(btn.dataset.act==='plus'){
    if(entry){ entry.qty++; } else { log.push({id:'l'+Date.now(), foodId:id, name:food.name, p:food.p, c:food.c, f:food.f, qty:1}); }
  } else {
    if(entry){ entry.qty--; if(entry.qty<=0) log = log.filter(e=>e!==entry); }
  }
  persistLog(); render();
});

document.getElementById('logList').addEventListener('click', e=>{
  const btn = e.target.closest('button[data-remove]');
  if(!btn) return;
  log = log.filter(e=>e.id!==btn.dataset.remove);
  persistLog(); render();
});

document.getElementById('libraryList').addEventListener('click', e=>{
  const btn = e.target.closest('button[data-delfood]');
  if(!btn) return;
  const id = btn.dataset.delfood;
  foods = foods.filter(f=>f.id!==id);
  log = log.filter(e=>e.foodId!==id);
  persistFoods(); persistLog(); render();
});

// tabs
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tabToday').style.display = tab.dataset.tab==='today' ? 'block':'none';
    document.getElementById('tabLibrary').style.display = tab.dataset.tab==='library' ? 'block':'none';
  });
});

// quick-add sheet
const quickOverlay = document.getElementById('quickOverlay');
function openQuick(){ quickOverlay.classList.add('open'); document.getElementById('q_name').focus(); }
document.getElementById('openQuick').onclick = openQuick;
document.getElementById('fabAdd').onclick = openQuick;
document.getElementById('q_cancel').onclick = ()=> quickOverlay.classList.remove('open');
document.getElementById('q_confirm').onclick = ()=>{
  const name = document.getElementById('q_name').value.trim() || 'Quick log';
  const p = parseFloat(document.getElementById('q_p').value)||0;
  const c = parseFloat(document.getElementById('q_c').value)||0;
  const f = parseFloat(document.getElementById('q_f').value)||0;
  log.push({id:'l'+Date.now(), foodId:null, name, p, c, f, qty:1});
  if(document.getElementById('q_save').checked){
    const category = document.getElementById('q_cat').value;
    foods.push({id:'f'+Date.now(), name, serving:'1 serving', p, c, f, category, hacks:[]});
    persistFoods();
  }
  persistLog();
  ['q_name','q_p','q_c','q_f'].forEach(id=>document.getElementById(id).value = id==='q_name'?'':'0');
  document.getElementById('q_save').checked = false;
  document.getElementById('q_cat_wrap').style.display = 'none';
  quickOverlay.classList.remove('open');
  render();
};
document.getElementById('q_save').addEventListener('change', e=>{
  document.getElementById('q_cat_wrap').style.display = e.target.checked ? 'block' : 'none';
});

// add food sheet
const foodOverlay = document.getElementById('foodOverlay');
document.getElementById('openAddFood').onclick = ()=> foodOverlay.classList.add('open');
document.getElementById('f_cancel').onclick = ()=> foodOverlay.classList.remove('open');
document.getElementById('f_confirm').onclick = ()=>{
  const name = document.getElementById('f_name').value.trim();
  if(!name) return;
  const p = parseFloat(document.getElementById('f_p').value)||0;
  const c = parseFloat(document.getElementById('f_c').value)||0;
  const f = parseFloat(document.getElementById('f_f').value)||0;
  const serving = document.getElementById('f_serving').value.trim() || '100g';
  const category = document.getElementById('f_cat').value;
  foods.push({id:'f'+Date.now(), name, serving, p, c, f, category, hacks:[]});
  persistFoods();
  ['f_name','f_p','f_c','f_f'].forEach(id=>document.getElementById(id).value = id==='f_name'?'':'0');
  document.getElementById('f_serving').value = '100g';
  document.getElementById('f_cat').value = 'PROTEIN';
  foodOverlay.classList.remove('open');
  render();
};

// goals sheet
const goalsOverlay = document.getElementById('goalsOverlay');
document.getElementById('setGoalsBtn').onclick = ()=>{
  document.getElementById('g_kcal').value = goals.kcal;
  document.getElementById('g_p').value = goals.p;
  document.getElementById('g_c').value = goals.c;
  document.getElementById('g_f').value = goals.f;
  goalsOverlay.classList.add('open');
};
document.getElementById('g_cancel').onclick = ()=> goalsOverlay.classList.remove('open');
document.getElementById('g_confirm').onclick = ()=>{
  goals = {
    kcal: parseFloat(document.getElementById('g_kcal').value)||0,
    p: parseFloat(document.getElementById('g_p').value)||0,
    c: parseFloat(document.getElementById('g_c').value)||0,
    f: parseFloat(document.getElementById('g_f').value)||0,
  };
  persistGoals();
  goalsOverlay.classList.remove('open');
  render();
};

// export / import
document.getElementById('exportBtn').onclick = ()=>{
  const data = {foods, goals, log, date: todayStr()};
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `macro-ledger-backup-${todayStr()}.json`;
  a.click();
};
document.getElementById('importBtn').onclick = ()=> document.getElementById('importFile').click();
document.getElementById('importFile').onchange = (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(data.foods) foods = data.foods;
      if(data.goals) goals = data.goals;
      if(data.log) log = data.log;
      persistFoods(); persistGoals(); persistLog();
      render();
      alert('Backup imported.');
    }catch(err){ alert('Could not read that file.'); }
  };
  reader.readAsText(file);
};

render();
</script>
</body>
</html>
